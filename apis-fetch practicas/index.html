<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Catálogo Real de Internet 🛍️</title>
    <style>
        body { font-family: sans-serif; background-color: #0f172a; color: white; padding: 40px; text-align: center; }
        button { padding: 15px 30px; font-size: 1.1rem; font-weight: 700; cursor: pointer; border: none; border-radius: 8px; background-color: #f43f5e; color: white; margin-bottom: 40px; }
        button:hover { background-color: #e11d48; }
        #contenedor-productos { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; max-width: 1000px; margin: 0 auto; list-style: none; padding: 0; }
        .tarjeta-ropa { background-color: #1e293b; padding: 20px; border-radius: 12px; border: 1px solid #334155; text-align: left; }
        .tarjeta-ropa h3 { margin: 0 0 10px 0; font-size: 1.2rem; color: #f43f5e; }
        .tarjeta-ropa p { margin: 0; color: #94a3b8; font-size: 1rem; }
    </style>
</head>
<body>

    <h1>🛒 Importador de Ropa en Vivo</h1>
    <button id="btnCargar">Descargar Catálogo de Internet</button>
    
    <ul id="contenedor-productos">
        <!-- JavaScript fabricará e inyectará las tarjetas aquí -->
    </ul>

    <script src="js/app.js"></script>
</body>
</html>
