<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>🛸 Star Wars Force-Pad Pro</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        :root {
            --bg-main: #0b0f19;
            --bg-card: #111827;
            --accent: #0ea5e9;
            --accent-fav: #e11d48;
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            --border: #374151;
        }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: var(--bg-main); color: var(--text-main); margin: 0; padding: 40px; }
        h1 { text-align: center; font-size: 2.5rem; letter-spacing: -1px; margin-bottom: 30px; color: var(--text-main); }
        h1 span { color: var(--accent); }
        .buscador-zona { max-width: 500px; margin: 0 auto 50px auto; display: flex; gap: 10px; }
        input { flex: 1; padding: 14px; border-radius: 8px; border: 1px solid var(--border); background-color: var(--bg-card); color: white; font-size: 1rem; }
        button { padding: 14px 28px; border-radius: 8px; border: none; font-weight: 700; cursor: pointer; background-color: var(--accent); color: white; font-size: 1rem; transition: all 0.2s ease; }
        button:hover { background-color: #38bdf8; transform: translateY(-1px); }
        .grid-layout { display: grid; grid-template-columns: 2fr 1fr; gap: 40px; max-width: 1200px; margin: 0 auto; }
        .seccion h2 { border-bottom: 2px solid var(--border); padding-bottom: 12px; margin-bottom: 20px; font-size: 1.5rem; }
        #contenedor-busqueda { display: flex; flex-direction: column; gap: 15px; }
        #lista-favoritos { list-style: none; padding: 0; margin: 0; display: flex; flex-direction: column; gap: 10px; }
        .tarjeta-personaje { background-color: var(--bg-card); border: 1px solid var(--border); padding: 24px; border-radius: 12px; display: flex; justify-content: space-between; align-items: center; }
        .info-peli h3 { margin: 0 0 8px 0; font-size: 1.3rem; color: white; }
        .info-peli p { margin: 0; color: var(--text-muted); font-size: 0.95rem; }
        .btn-fav { background-color: var(--accent-fav); }
        .btn-fav:hover { background-color: #f43f5e; }
        .item-fav { background-color: #1e1b4b; border: 1px solid #4338ca; padding: 14px; border-radius: 8px; font-weight: 600; display: flex; justify-content: space-between; align-items: center; }
        .btn-borrar-fav { background-color: transparent; border: 1px solid var(--border); color: var(--text-muted); padding: 6px 12px; font-size: 0.85rem; }
        .btn-borrar-fav:hover { background-color: var(--accent-fav); color: white; border-color: var(--accent-fav); }
    </style>
</head>
<body>

    <h1>🛸 Star Wars <span>Force-Pad Pro</span></h1>

    <div class="buscador-zona">
        <input type="number" id="inputGalactico" placeholder="Introduce el ID de un personaje (1 al 83)...">
        <button id="btnEscanear">Escanear</button>
    </div>

    <div class="grid-layout">
        <div class="seccion">
            <h2>📡 Resultado del Escáner</h2>
            <div id="contenedor-busqueda">

            </div>
        </div>
        <div class="seccion">
            <h2>⭐ Mis Favoritos Inmortales</h2>
            <ul id="lista-favoritos">
               
            </ul>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
