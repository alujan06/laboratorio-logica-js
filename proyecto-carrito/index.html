<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Mi Tienda Virtual Pro 🛒</title>
    <style>
        body { font-family: sans-serif; max-width: 600px; margin: 20px auto; padding: 20px; }
        .producto, .item-carrito { display: flex; justify-content: space-between; padding: 10px; margin: 5px 0; border: 1px solid #ddd; border-radius: 5px; }
        #seccion-carrito { margin-top: 30px; background-color: #f9f9f9; padding: 15px; border-radius: 8px; }
    </style>
</head>
<body>

    <h1>🛒 Catálogo de Ropa</h1>
    
    <div id="catalogo">
        <div class="producto">
            <span>Camiseta Negra (25€)</span>
            <button id="btn-camiseta">Añadir al carrito</button>
        </div>
        <div class="producto">
            <span>Pantalón Vaquero (40€)</span>
            <button id="btn-pantalon">Añadir al carrito</button>
        </div>
    </div>

    <div id="seccion-carrito">
        <h2>🛍️ Mi Lista de la Compra</h2>
        <ul id="lista-carrito"></ul>
        <h3>Total a Pagar: <span id="precio-total">0</span>€</h3>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
