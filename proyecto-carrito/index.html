<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>⚡ Mi Tienda Virtual Pro 🛒</title>
    <link href="https://googleapis.com" rel="stylesheet">
    
    <style>
        :root {
            --bg-main: #f8fafc;
            --bg-card: #ffffff;
            --text-dark: #0f172a;
            --text-muted: #64748b;
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --danger: #ef4444;
            --danger-hover: #dc2626;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg-main);
            color: var(--text-dark);
            max-width: 800px;
            margin: 40px auto;
            padding: 20px;
        }

        h1 {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 2rem;
            text-align: center;
        }

        h2 {
            font-size: 1.4rem;
            font-weight: 600;
            margin-bottom: 1.5rem;
            border-bottom: 2px solid #e2e8f0;
            padding-bottom: 10px;
        }

        #catalogo {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 40px;
        }

        .producto {
            background: var(--bg-card);
            border-radius: 12px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            gap: 15px;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.05), 0 2px 4px -2px rgb(0 0 0 / 0.05);
            border: 1px solid #f1f5f9;
        }

        .producto-info {
            display: flex;
            flex-direction: column;
        }

        .producto-nombre {
            font-weight: 600;
            font-size: 1.1rem;
        }

        .producto-precio {
            color: var(--text-muted);
            font-size: 0.95rem;
            margin-top: 4px;
        }

        .btn-add {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 10px 16px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn-add:hover {
            background-color: var(--primary-hover);
            transform: translateY(-1px);
        }

        #seccion-carrito {
            background: var(--bg-card);
            padding: 24px;
            border-radius: 16px;
            box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.05);
            border: 1px solid #e2e8f0;
        }

        #lista-carrito {
            list-style: none;
            padding: 0;
            margin: 0 0 20px 0;
        }

        .item-carrito {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            background-color: #f8fafc;
            border-radius: 8px;
            margin-bottom: 10px;
            border: 1px solid #f1f5f9;
            animation: fadeIn 0.3s ease;
        }

        .btn-delete {
            background-color: #fee2e2;
            color: var(--danger);
            border: none;
            width: 32px;
            height: 32px;
            border-radius: 6px;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
        }

        .btn-delete:hover {
            background-color: var(--danger);
            color: white;
        }

        .total-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 1.3rem;
            font-weight: 700;
            margin-top: 20px;
            padding-top: 15px;
            border-top: 2px dashed #e2e8f0;
        }

        #precio-total {
            color: var(--primary);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <h1>🛒 Mi Tienda Virtual Pro</h1>
    
    <h2>📦 Catálogo de Productos</h2>
    <div id="catalogo">
        <div class="producto">
            <div class="producto-info">
                <span class="producto-nombre">👕 Camiseta Negra</span>
                <span class="producto-precio">25.00€</span>
            </div>
            <button class="btn-add" id="btn-camiseta">Añadir al carrito</button>
        </div>
        <div class="producto">
            <div class="producto-info">
                <span class="producto-nombre">👖 Pantalón Vaquero</span>
                <span class="producto-precio">40.00€</span>
            </div>
            <button class="btn-add" id="btn-pantalon">Añadir al carrito</button>
        </div>
    </div>

    <div id="seccion-carrito">
        <h2>🛍️ Mi Lista de la Compra</h2>
        <ul id="lista-carrito"></ul>
        <div class="total-container">
            <span>Total a Pagar:</span>
            <span><span id="precio-total">0</span>€</span>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
